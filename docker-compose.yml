version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bmt_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: book_my_ticket
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
